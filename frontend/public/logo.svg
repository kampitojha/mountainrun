<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <defs>
    <!-- Brand Gradient: Teal to Indigo -->
    <linearGradient id="logo-grad-primary" x1="4" y1="48" x2="48" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d9488"/>
      <stop offset="0.6" stop-color="#10b981"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Soft fill gradient -->
    <linearGradient id="logo-grad-fill" x1="4" y1="48" x2="48" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d9488" stop-opacity="0.06"/>
      <stop offset="0.6" stop-color="#10b981" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Sun Gradient -->
    <linearGradient id="logo-grad-sun" x1="28" y1="8" x2="40" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>
  
  <g transform="translate(6, 4)">
    <!-- Glowing Sun / Rising Energy -->
    <circle cx="34" cy="16" r="6" fill="url(#logo-grad-sun)" />
    
    <!-- Mountains Fill -->
    <path d="M6 38 L17 18 L25 31 L34 14 L42 38 Z" fill="url(#logo-grad-fill)" />
    
    <!-- Mountains Strokes -->
    <path d="M6 38 L17 18 L25 31 L34 14 L42 38" stroke="url(#logo-grad-primary)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Dynamic Running Trail -->
    <path d="M4 32 C 14 32, 18 25, 26 25 C 34 25, 36 34, 44 34" stroke="url(#logo-grad-primary)" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />
  </g>

  <!-- Typography with premium look and weight contrast -->
  <text
    x="68"
    y="33"
    fill="#0f172a"
    font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
    font-size="20"
    font-weight="500"
    letter-spacing="-0.02em"
  >Mountain <tspan fill="#0d9488" font-weight="800">Run</tspan></text>
</svg>
