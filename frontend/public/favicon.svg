<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Background gradient: deep slate to dark teal -->
    <linearGradient id="fav-bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0d2d26"/>
    </linearGradient>
    <!-- Mountain stroke gradient: teal to emerald to indigo -->
    <linearGradient id="fav-stroke" x1="4" y1="42" x2="44" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d9488"/>
      <stop offset="0.55" stop-color="#10b981"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Mountain fill: very soft teal glow -->
    <linearGradient id="fav-fill" x1="4" y1="42" x2="44" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d9488" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0.08"/>
    </linearGradient>
    <!-- Sun: warm gold to rose -->
    <linearGradient id="fav-sun" x1="28" y1="8" x2="40" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="48" height="48" rx="11" fill="url(#fav-bg)"/>

  <!-- Rising Sun glow halo -->
  <circle cx="34" cy="15" r="8" fill="#fbbf24" fill-opacity="0.12"/>

  <!-- Sun core -->
  <circle cx="34" cy="15" r="5" fill="url(#fav-sun)"/>

  <!-- Mountain fill -->
  <path d="M5 39 L16 19 L24 31 L33 13 L43 39 Z" fill="url(#fav-fill)"/>

  <!-- Mountain outline strokes -->
  <path d="M5 39 L16 19 L24 31 L33 13 L43 39" stroke="url(#fav-stroke)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Running trail wave -->
  <path d="M4 33 C12 33, 17 26, 24 26 C31 26, 35 34, 44 34" stroke="url(#fav-stroke)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85"/>
</svg>
